<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Backup - Copa Psyzon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #042D15, #0a5a2f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { opacity: 0.8; margin-bottom: 30px; }
        .btn {
            background: #16A34A;
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #15803d; transform: scale(1.03); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #log {
            margin-top: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            font-family: monospace;
        }
        .ok { color: #4ade80; }
        .err { color: #f87171; }
        .info { color: #facc15; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Importar Backup</h1>
        <p>Clique no botão para enviar todos os dados do backup para o Firebase do site novo.</p>
        <button class="btn" id="btn-importar" onclick="iniciarImportacao()">Importar Agora</button>
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCL2u-oSlw8EWQ96atPI9Tc-0cIl2k9K6M",
            authDomain: "copa-psyzon2.firebaseapp.com",
            projectId: "copa-psyzon2",
            storageBucket: "copa-psyzon2.firebasestorage.app",
            messagingSenderId: "934292793843",
            appId: "1:934292793843:web:2f67fc6d314e1185f6ca86",
            measurementId: "G-G9Q14JE533",
            databaseURL: "https://copa-psyzon2-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const logEl = document.getElementById('log');

        function log(msg, type = '') {
            logEl.innerHTML += `<div class="${type}">${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        window.iniciarImportacao = async function() {
            const btn = document.getElementById('btn-importar');
            btn.disabled = true;
            btn.textContent = 'Importando...';
            log('⏳ Carregando arquivo de backup...', 'info');

            try {
                const resp = await fetch('./backup_copa_psyzon_2026-04-20 (3) (1).json');
                if (!resp.ok) throw new Error('Não foi possível carregar o arquivo JSON.');
                const backup = await resp.json();
                log('✅ Backup carregado com sucesso!', 'ok');

                // 1. Salvar dados do torneio como histórico (Edição 1)
                const historyEntry = {
                    tournamentName: backup.tournamentName || "COPA PSYZON - EDIÇÃO 1",
                    teamCount: backup.teamCount,
                    twoLegged: backup.twoLegged,
                    tournamentFormat: backup.tournamentFormat,
                    groupCount: backup.groupCount,
                    groups: backup.groups || [],
                    bracket: backup.bracket || null,
                    bracketFromGroups: backup.bracketFromGroups || null,
                    champion: backup.champion || null,
                    prize: backup.prize || "",
                    singleLegFinal: backup.singleLegFinal || false,
                    groupDirectQualified: backup.groupDirectQualified || 1,
                    groupRepechage: backup.groupRepechage || 1,
                    playerStats: backup.playerStats || {},
                    attendance: backup.attendance || {},
                    importedAt: new Date().toISOString()
                };

                // 2. Salvar os times/participantes
                log('📤 Enviando participantes...', 'info');
                if (backup.teams && backup.teams.length > 0) {
                    const participantsObj = {};
                    backup.teams.forEach((t, i) => {
                        const key = t.id || ('p_' + i);
                        participantsObj[key] = {
                            nome: t.playerName,
                            nick: t.teamName,
                            photo: t.photo || null,
                            countryCode: t.flagId || 'br',
                            id: t.id,
                            importado: true
                        };
                    });
                    await set(ref(db, 'participants'), participantsObj);
                    log(`✅ ${backup.teams.length} participantes importados!`, 'ok');
                }

                // 3. Salvar torneio no histórico
                log('📤 Enviando histórico do torneio (Edição 1)...', 'info');
                const historyKey = 'edicao_1_' + Date.now();
                await set(ref(db, 'tournamentsHistory/' + historyKey), historyEntry);
                log('✅ Histórico do torneio salvo!', 'ok');

                // 4. Salvar playerStats separadamente
                if (backup.playerStats && Object.keys(backup.playerStats).length > 0) {
                    log('📤 Enviando estatísticas dos jogadores...', 'info');
                    await set(ref(db, 'playerStats'), backup.playerStats);
                    log(`✅ Estatísticas de ${Object.keys(backup.playerStats).length} jogadores importadas!`, 'ok');
                }

                // 5. Salvar tournamentsHistory do backup (se existir)
                if (backup.tournamentsHistory && backup.tournamentsHistory.length > 0) {
                    log('📤 Enviando histórico de torneios anteriores...', 'info');
                    const histObj = {};
                    backup.tournamentsHistory.forEach((h, i) => {
                        histObj['hist_' + i + '_' + Date.now()] = h;
                    });
                    await set(ref(db, 'tournamentsHistory_legacy'), histObj);
                    log(`✅ ${backup.tournamentsHistory.length} registros de histórico importados!`, 'ok');
                }

                // 6. Salvar códigos se existirem
                if (backup.codes) {
                    log('📤 Enviando códigos...', 'info');
                    await set(ref(db, 'codes'), backup.codes);
                    log('✅ Códigos importados!', 'ok');
                }

                // 7. Salvar attendance (lista de presença)
                if (backup.attendance) {
                    log('📤 Enviando lista de presença...', 'info');
                    await set(ref(db, 'attendance'), backup.attendance);
                    log('✅ Lista de presença importada!', 'ok');
                }

                // 8. Salvar backup completo como referência
                log('📤 Salvando backup completo como referência...', 'info');
                await set(ref(db, 'backups/edicao1'), backup);
                log('✅ Backup completo salvo como referência!', 'ok');

                log('', '');
                log('🎉 IMPORTAÇÃO CONCLUÍDA COM SUCESSO!', 'ok');
                log('Todos os dados do site antigo foram restaurados.', 'ok');

                btn.textContent = '✅ Importação Concluída!';
                btn.style.background = '#15803d';

            } catch (e) {
                log('❌ ERRO: ' + e.message, 'err');
                console.error(e);
                btn.disabled = false;
                btn.textContent = 'Tentar Novamente';
            }
        };
    </script>
</body>
</html>
