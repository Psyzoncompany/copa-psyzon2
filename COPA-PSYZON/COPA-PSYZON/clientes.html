<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clientes — COPA PSYZON</title>
  <meta name="description" content="Ficha técnica dos participantes da Copa Psyzon">
  <link rel="stylesheet" href="style.css">
  <style>
    .clients-page {
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 0;
    }

    .clients-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .clients-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      flex: 1;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-back:hover {
      background: var(--accent-blue);
      color: #fff;
      border-color: var(--accent-blue);
    }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .client-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .client-card:hover {
      border-color: var(--accent-blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 122, 255, 0.12);
    }

    .client-card:active {
      transform: translateY(0);
    }

    .client-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 2px solid var(--border-secondary);
    }

    .client-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .client-avatar .av-placeholder {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .client-info {
      flex: 1;
      min-width: 0;
    }

    .client-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-nick {
      font-size: 13px;
      color: var(--accent-blue);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .client-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .client-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .client-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
    }

    /* Profile Detail Modal */
    .profile-detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 20px;
    }

    .profile-detail-overlay.active {
      display: flex;
    }

    .profile-detail-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    .profile-detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 3px solid var(--accent-blue);
    }

    .profile-detail-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-detail-avatar .av-placeholder {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .profile-detail-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .profile-detail-nick {
      font-size: 14px;
      color: var(--accent-blue);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .profile-detail-fields {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .profile-field {
      background: var(--bg-tertiary);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .profile-field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .profile-field-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-all;
    }

    .profile-field-value a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    .profile-stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .profile-stats-row .stat-item {
      flex: 1;
      background: var(--bg-tertiary);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 600;
    }

    .empty-clients {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }

    .empty-clients svg {
      opacity: 0.3;
      margin-bottom: 16px;
    }

    .empty-clients p {
      font-size: 15px;
      margin: 4px 0;
    }

    .clients-count {
      padding: 12px 20px 0;
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 600;
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div class="clients-page">

    <!-- Header -->
    <header class="clients-header">
      <a href="index.html" class="btn-back">
        <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6" />
        </svg> Voltar
      </a>
      <h1>
        <svg class="svg-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg> Ficha dos Clientes
      </h1>
    </header>

    <!-- Clients Count -->
    <div id="clients-count" class="clients-count"></div>

    <!-- Clients Grid -->
    <div id="clients-grid" class="clients-grid"></div>

    <!-- Empty State -->
    <div id="empty-clients" class="empty-clients" style="display:none;">
      <svg class="svg-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <line x1="17" x2="22" y1="11" y2="11" />
      </svg>
      <p style="font-weight:700;">Nenhum participante cadastrado</p>
      <p>Os participantes aparecerão aqui conforme se cadastrarem.</p>
    </div>

    <!-- Profile Detail Modal -->
    <div id="profile-detail-overlay" class="profile-detail-overlay">
      <div class="profile-detail-card">
        <div id="detail-avatar" class="profile-detail-avatar"></div>
        <h2 id="detail-name" class="profile-detail-name"></h2>
        <p id="detail-nick" class="profile-detail-nick"></p>

        <div class="profile-stats-row">
          <div class="stat-item">
            <div id="detail-trophies" class="stat-value">0</div>
            <div class="stat-label">Troféus</div>
          </div>
          <div class="stat-item">
            <div id="detail-finals" class="stat-value">0</div>
            <div class="stat-label">Finais</div>
          </div>
          <div class="stat-item">
            <div id="detail-semis" class="stat-value">0</div>
            <div class="stat-label">Semifinais</div>
          </div>
        </div>

        <div id="detail-fields" class="profile-detail-fields"></div>

        <div id="admin-edit-actions" style="display:none; margin-top:12px;">
          <button type="button" id="btn-edit-client" class="btn btn-primary btn-sm">Editar</button>
          <button type="button" id="btn-save-client" class="btn btn-success btn-sm" style="display:none;">Salvar</button>
          <button type="button" id="btn-cancel-edit" class="btn btn-outline btn-sm" style="display:none;">Cancelar</button>
        </div>
        <button type="button" id="btn-close-detail" class="btn btn-outline btn-sm" style="margin-top:8px;">Fechar</button>
      </div>
    </div>

    <!-- Sponsors Section (Global) -->
    <div class="sponsors-wrapper px-5" style="margin-bottom: 40px;"></div>

  </div>

  <!-- Global script -->
  <script src="common.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    (function () {
      'use strict';

      const firebaseConfig = {
        apiKey: "AIzaSyDPH-ltsHg4nYeoZpDPq_80sfvcMaS-oXs",
        authDomain: "copa-psyzon.firebaseapp.com",
        projectId: "copa-psyzon",
        storageBucket: "copa-psyzon.firebasestorage.app",
        messagingSenderId: "74729053927",
        appId: "1:74729053927:web:ec295dcc38c640256d8c42"
      };

      let db = null;
      let auth = null;

      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
      } catch (_) { }

      const $ = (sel) => document.querySelector(sel);

      function sanitize(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function initials(name) {
        if (!name) return '?';
        const parts = name.trim().split(/\s+/);
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
      }

      function formatCPFMasked(cpf) {
        if (!cpf || cpf.length < 11) return '***.***.***-**';
        return cpf.substring(0, 3) + '.***.***-' + cpf.substring(9, 11);
      }

      let state = { participants: [], teams: [], playerStats: {} };

      function renderClients() {
        const grid = $('#clients-grid');
        const empty = $('#empty-clients');
        const countEl = $('#clients-count');
        if (!grid) return;

        const participants = state.participants || [];

        if (participants.length === 0) {
          grid.innerHTML = '';
          if (empty) empty.style.display = '';
          if (countEl) countEl.textContent = '';
          return;
        }

        if (empty) empty.style.display = 'none';
        if (countEl) countEl.textContent = `${participants.length} participante(s) cadastrado(s)`;

        let html = '';
        participants.forEach((p, idx) => {
          const avatar = p.photo
            ? '<img src="' + sanitize(p.photo) + '" alt="">'
            : '<span class="av-placeholder">' + sanitize(initials(p.name)) + '</span>';

          const igBadge = p.instagram
            ? '<span>📸 ' + sanitize(p.instagram) + '</span>'
            : '';

          html += `
            <div class="client-card" data-idx="${idx}">
              <div class="client-avatar">${avatar}</div>
              <div class="client-info">
                <div class="client-name">${sanitize(p.name)}</div>
                <div class="client-nick">${sanitize(p.nick)}</div>
                <div class="client-meta">
                  ${igBadge}
                  <span class="client-badge">Código: ${sanitize(p.code)}</span>
                </div>
              </div>
            </div>`;
        });

        grid.innerHTML = html;

        // Click handlers
        grid.querySelectorAll('.client-card').forEach(card => {
          card.addEventListener('click', () => {
            const idx = parseInt(card.dataset.idx, 10);
            openDetail(participants[idx]);
          });
        });
      }

      let editingClient = null;
      function openDetail(p) {
        if (!p) return;
        editingClient = null;
        const overlay = $('#profile-detail-overlay');
        if (!overlay) return;

        // Avatar
        const avatarEl = $('#detail-avatar');
        if (avatarEl) {
          if (p.photo) {
            avatarEl.innerHTML = '<img src="' + sanitize(p.photo) + '" alt="">';
          } else {
            avatarEl.innerHTML = '<span class="av-placeholder">' + sanitize(initials(p.name)) + '</span>';
          }
        }

        // Name & nick
        const nameEl = $('#detail-name');
        const nickEl = $('#detail-nick');
        if (nameEl) nameEl.textContent = p.name;
        if (nickEl) nickEl.textContent = p.nick;

        // Stats
        const team = (state.teams || []).find(t => t.id === p.id);
        const stats = (state.playerStats && state.playerStats[p.id]) || {};
        const trEl = $('#detail-trophies');
        const fiEl = $('#detail-finals');
        const sfEl = $('#detail-semis');
        if (trEl) trEl.textContent = stats.trophies || 0;
        if (fiEl) fiEl.textContent = stats.finals || 0;
        if (sfEl) sfEl.textContent = stats.semifinals || 0;

        // Fields
        const fieldsEl = $('#detail-fields');
        if (fieldsEl) {
          let fieldsHtml = '';

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">CPF</div>
            <div class=\"profile-field-value\">${formatCPFMasked(p.cpf)}</div>
          </div>`;

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">Nome</div>
            <div class=\"profile-field-value\" id=\"edit-field-name\">${sanitize(p.name)}</div>
          </div>`;

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">Apelido</div>
            <div class=\"profile-field-value\" id=\"edit-field-nick\">${sanitize(p.nick)}</div>
          </div>`;

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">Instagram</div>
            <div class=\"profile-field-value\" id=\"edit-field-instagram\">${p.instagram ? `@${sanitize(p.instagram.replace(/^@/,''))}` : ''}</div>
          </div>`;

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">WhatsApp</div>
            <div class=\"profile-field-value\" id=\"edit-field-whatsapp\">${sanitize(p.whatsapp || '')}</div>
          </div>`;

          fieldsHtml += `<div class=\"profile-field\">
            <div class=\"profile-field-label\">Código Utilizado</div>
            <div class=\"profile-field-value\">${sanitize(p.code)}</div>
          </div>`;

          if (p.registeredAt) {
            try {
              const d = new Date(p.registeredAt);
              const formatted = d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
              fieldsHtml += `<div class=\"profile-field\">
                <div class=\"profile-field-label\">Data de Cadastro</div>
                <div class=\"profile-field-value\">${formatted}</div>
              </div>`;
            } catch (_) { }
          }

          fieldsEl.innerHTML = fieldsHtml;
        }

        // Mostrar botões de edição só para admin
        const editActions = $('#admin-edit-actions');
        if (editActions) {
          editActions.style.display = 'none';
          if (auth && auth.currentUser) {
            // Usuário logado = admin
            editActions.style.display = '';
            $('#btn-edit-client').style.display = '';
            $('#btn-save-client').style.display = 'none';
            $('#btn-cancel-edit').style.display = 'none';
          }
        }

        overlay.classList.add('active');
        editingClient = p;
      }

      function enableEditClient() {
        if (!editingClient) return;
        // Troca campos para inputs
        function inputHtml(id, val, type='text') {
          return `<input type=\"${type}\" id=\"input-${id}\" value=\"${sanitize(val||'')}\" class=\"form-control\" style=\"width:100%;max-width:300px\">`;
        }
        $('#edit-field-name').innerHTML = inputHtml('name', editingClient.name);
        $('#edit-field-nick').innerHTML = inputHtml('nick', editingClient.nick);
        $('#edit-field-instagram').innerHTML = inputHtml('instagram', editingClient.instagram||'');
        $('#edit-field-whatsapp').innerHTML = inputHtml('whatsapp', editingClient.whatsapp||'');
        // Botões
        $('#btn-edit-client').style.display = 'none';
        $('#btn-save-client').style.display = '';
        $('#btn-cancel-edit').style.display = '';
      }

      function cancelEditClient() {
        if (!editingClient) return;
        openDetail(editingClient);
      }

      async function saveEditClient() {
        if (!editingClient) return;
        // Coleta valores
        const name = $('#input-name').value.trim();
        const nick = $('#input-nick').value.trim();
        let instagram = $('#input-instagram').value.trim();
        if (instagram && !instagram.startsWith('@')) instagram = '@'+instagram;
        const whatsapp = $('#input-whatsapp').value.trim();
        // Atualiza local
        editingClient.name = name;
        editingClient.nick = nick;
        editingClient.instagram = instagram;
        editingClient.whatsapp = whatsapp;
        // Atualiza no Firestore
        try {
          const docRef = db.collection('tournaments').doc('main');
          const docSnap = await docRef.get();
          if (docSnap.exists) {
            const data = docSnap.data();
            const participants = data.participants || [];
            const idx = participants.findIndex(x => x.id === editingClient.id);
            if (idx !== -1) {
              participants[idx] = { ...participants[idx], name, nick, instagram, whatsapp };
              await docRef.update({ participants });
              showToast('Cadastro atualizado!', 'success');
              openDetail(participants[idx]);
            }
          }
        } catch (e) {
          showToast('Erro ao salvar: ' + e, 'error');
        }
      }

      // Bind botões de edição
      setTimeout(() => {
        const btnEdit = $('#btn-edit-client');
        const btnSave = $('#btn-save-client');
        const btnCancel = $('#btn-cancel-edit');
        if (btnEdit) btnEdit.onclick = enableEditClient;
        if (btnSave) btnSave.onclick = saveEditClient;
        if (btnCancel) btnCancel.onclick = cancelEditClient;
      }, 500);

      function closeDetail() {
        const overlay = $('#profile-detail-overlay');
        if (overlay) overlay.classList.remove('active');
      }

      // Close modal
      const btnClose = $('#btn-close-detail');
      if (btnClose) btnClose.addEventListener('click', closeDetail);

      const overlay = $('#profile-detail-overlay');
      if (overlay) {
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) closeDetail();
        });
      }

      // Subscribe to Firestore
      if (db) {
        db.collection('tournaments').doc('main').onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            state.participants = data.participants || [];
            state.teams = data.teams || [];
            state.playerStats = data.playerStats || {};
          }
          renderClients();
        });
      }

      // Check auth - redirect if not admin
      if (auth) {
        auth.onAuthStateChanged((user) => {
          if (!user) {
            // Not logged in - redirect to main page
            window.location.href = 'index.html';
          }
        });
      }
    })();
  </script>
</body>

</html>
